<!DOCTYPE html>
<html>
<head>
    <title>Display Image</title>
</head>
<body>
    <button onclick="showImage()">Show Image</button>
    <img id="image"
         src="https://picsum.photos/250"
         style="display:none;">
    <script>
        function showImage(){
            let image=document.getElementById("image");
            image.style.display="block";
        }
    </script>
</body>
