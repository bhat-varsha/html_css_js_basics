<!DOCTYPE html>
<html>
    <head>
        <title>2 question on april2 </title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
<body class="bg-purple-900 text-white p-6 flex items-center justify-center h-screen">
    <p>using tailwind classes create a list using text boxes and buttons(use div tag)</p>
    <h1>list creation</h1>
    <button type onclick = "changeText1()" class="bg-yellow-500 hover:bg-yellow-700 text-white font-bold py-2 px-4 rounded">
        Click me!
    </button>
    <div id="list" class="bg-gray-100 p-4 rounded text-left"></div>
    <script>
        function changeText1() {
        document.getElementById('list').innerHTML=`
        <ol>
            <li>one</li>
            <li>two</li>
        </ol>
        `}
    </script>
</body>
</html>
