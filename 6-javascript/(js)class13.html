    <p id="name4">original</p>
    <button type onclick="changeText()" class="bg-yellow-500 hover:bg-yellow-700 text-white font-bold py-2 px-4 rounded">

<!____________________________________________________________________________________________-->
    <! Every click creates NEW-->
    <! create a button ,and then one div box -->
    <! then create new variable p, and use fucntion document.createElement('p') to create new p element -->
    <! then use innerText to add text to p element -->
    <!basucally writing <p>new item</p> in js -->
    <! then use appendChild to add p element to div box -->


    <button  onclick="addItem()">add item </button>
    <div id="container" class="mt-4 p-4 bg-gray-800 rounded"></div>
    <script>
        function addItem(){
            let p= document.createElement('p');
            p.innerText="new item";
            document.getElementById('container').appendChild(p);
        }
    </script>

</body>
