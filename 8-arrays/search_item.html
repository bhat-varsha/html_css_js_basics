<input id="gene" type="text" placeholder="Enter value">
<button onclick="add()">Add</button>
<button onclick="search()">Search</button>

<script>
let arr = [];

function add(){
    let val = document.getElementById("gene").value;
    if(val=="") 
    return;
    arr.push(val);
    console.log(arr);
    document.getElementById("gene").value="";
}
function search(){
    let val = document.getElementById("gene").value;
    if(arr.includes(val)){
        alert("Found");
    } else {
        alert("Not Found");
    }
}
</script>
