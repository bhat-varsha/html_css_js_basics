<!--take the input from suers and save it to an array and present the array as list-->
<input id ="gene" type="text"></input>
<button onclick="AddGene()">ADD</button> 

<div id="list" ></div>
<button onclick="addlist()">list added</button>
<script>
    let gene=[];
    function AddGene(){
        let value=document.getElementById('gene').value;
        if(value=="")
        return;
        gene.push(value);  // Add value to the END of the array
        console.log(gene);  // print the array to the console
        document.getElementById('gene').value = ""; // clear input
    }
    function addlist(){
        let value = "<ul>";
        for(let i=0;i<gene.length;i++){
            value += "<li>" + gene[i] + "</li>";
        }
        value += "</ul>";
        document.getElementById('list').innerHTML = value;
}

    
</script>
