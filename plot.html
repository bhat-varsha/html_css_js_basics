<!DOCTYPE html>
<html>
<head>
    <title>Bar Chart using Plotly.js</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div id="myPlot"></div>
    <script>
        let data = [{
            x: ["Gene A", "Gene B", "Gene C"],
            y: [25, 40, 15],
            type: "bar"
        }];
        Plotly.newPlot("myPlot", data);
    </script>
</body>
</html>
