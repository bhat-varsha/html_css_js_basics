<!DOCTYPE html>
<html>
    <head>
        <title>question7</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body bg-green-500 text-black>
        <p>create a button which when clicked remove the item that matches the input text.</p>
        <input type="text" id="inputBox" placeholder="Enter item">
        <button onclick="removeItem()">Remove Item</button>
        <ul id="myList">
            <li>apple</li>
            <li>banana</li>
            <li>mango</li>
        </ul>
        <script>
        function removeItem(){
            let value = document.getElementById("inputBox").value;
            let list = document.getElementById("myList");
            let list_items = list.getElementsByTagName("li"); //Get all list items
            for(let i = 0; i < list_items.length; i++){
                if(list_items[i].innerText === value){
                    list.removeChild(list_items[i]);
                    break; // stop the loop after removing 
                }
            }
        }
        </script>
    </body>
</html>
