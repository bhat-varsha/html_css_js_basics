<!DOCTYPE html>
<html>
<body>
<form onsubmit="return validateForm()">
<input type="text" id="name">
<button type="submit">Submit</button>
</form>

<script>
function validateForm() {
    let username = document.getElementById("name").value;
    if(username == "") {
        alert("Name cannot be empty");
        return false;
    }
}
</script>
</body>
</html>
