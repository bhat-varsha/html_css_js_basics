<!DOCTYPE html>
<html lang="en">    
    <head>
        <title>Question 6</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body>
        <p>create a button which when clicked remove the last item from list.</p>
        <button onclick="removeLastItem()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
            Remove Last Item
        </button>
        <ul id="myList">
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
        <script>
            function removeLastItem() {
                const list = document.getElementById('myList');
                if (list.lastElementChild) { // to check if there are any items in the list
                    list.removeChild(list.lastElementChild);
                }
            }
        </script>
    </body>
</html>
