<!DOCTYPE html>
<html>
    <head>
        <title>Question 10</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 text-black p-4">
        <p>create a button that shows and hides a mesage when cliked</p>
        <br></br>
        <h1 id ="display">javascript is confusing</h1>
        <button type="button" onclick="showandhide()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
            click me  to hide the text!!
        </button>
        <script>
            function showandhide(){
                let message = document.getElementById('display');
                if(message.style.display === "none"){
                    message.style.display = "block";
                }
                else{
                    message.style.display = "none";
                }
            }
        </script>
    </body> 
</html>
