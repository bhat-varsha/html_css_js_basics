<!DOCTYPE html>
<html>
    <head>
        <title>Question 1</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 text-black p-4">
        <h1>create a button n then click, print out a message Hello World incorporating html with js</h1>
        <button type="button" onclick="message()" class="bg-yellow-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
            click me
        </button>
        <p id="new"></p>
        <script>
            function message(){
                document.getElementById('new').innerText="hello world";
                document.getElementById('new').style.color = "pink"; //to change the color dynamically after clicking the button
            }
        </script>
    </body>

</html>
