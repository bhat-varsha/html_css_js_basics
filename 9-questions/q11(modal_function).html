<!DOCTYPE html>
<html>
<body>

<button onclick="openModal()">Open Modal</button>

<div id="modal">

<h3>This is a Modal</h3>

<button onclick="closeModal()">Close</button>

</div>

<script>

function openModal() {
    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
