<!DOCTYPE html>
<html>
    <head>
        <title>question7</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body bg-green-500 text-black>
        <p>when the user clicks on the list item, it removes the item.</p>
        <ul id="myList">
            <li onclick="removeItem(this)">apple</li> 
            <li onclick="removeItem(this)">banana</li>
            <li onclick="removeItem(this)">mango</li>
        </ul>
        <script>
        function removeItem(item){
            item.remove(); // Directly removes element
        }
        </script>
    </body>
</html>
